<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#dcebef">
    <title>Entity · Living Interface</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="stage" aria-label="Entity visual presence mockup">
      <section class="presence-shell">
        <div class="glass-plate">
          <div class="interface-rail" aria-hidden="true">
            <span>LOCAL PRESENCE</span>
            <i></i>
            <span>AE-01</span>
          </div>
          <canvas id="entity-canvas" width="1200" height="900"></canvas>
          <div class="scanline-overlay" aria-hidden="true"></div>
          <div class="corner-readout top-left">
            <span class="label">ENTITY</span>
            <strong id="mode-readout">IDLE</strong>
          </div>
          <div class="corner-readout top-right">
            <span class="label">VITALITY</span>
            <strong id="energy-readout">62%</strong>
          </div>
          <div class="runtime-link" id="runtime-link" data-connected="false">
            <span class="link-light"></span>
            <span id="runtime-label">AWAITING ENTITY</span>
          </div>
          <div class="biosignal" aria-label="Entity homeostasis">
            <span>HOMEOSTASIS</span><i><b></b></i><strong>STABLE</strong>
          </div>
          <div class="status-panel">
            <span id="message-readout">Soft standby</span>
          </div>
        </div>
      </section>

      <details class="controls" aria-label="Interface laboratory controls">
        <summary>
          <span>Interface laboratory</span>
          <small>manual state preview</small>
        </summary>
        <div class="state-buttons" role="group" aria-label="Entity state">
          <button class="active" data-mode="idle">Idle</button>
          <button data-mode="listening">Listening</button>
          <button data-mode="thinking">Thinking</button>
          <button data-mode="speaking">Speaking</button>
          <button data-mode="acting">Acting</button>
          <button data-mode="autonomous_goal">Autonomous</button>
          <button data-mode="waiting_confirmation">Waiting</button>
          <button data-mode="service_issue">Service Issue</button>
          <button data-mode="offline">Offline</button>
        </div>

        <div class="control-row">
          <label>
            Energy
            <input id="energy" type="range" min="0" max="100" value="62">
          </label>
          <label>
            Bloom
            <input id="bloom" type="range" min="0" max="100" value="74">
          </label>
          <label class="toggle">
            <input id="scanlines" type="checkbox" checked>
            <span>CRT scanlines</span>
          </label>
        </div>

        <label class="message-control">
          Message
          <input id="message" type="text" value="Soft standby">
        </label>
      </details>
    </main>

    <script src="app.js"></script>
  </body>
</html>
