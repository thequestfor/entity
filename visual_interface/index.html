<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entity Visual Interface Prototype</title>
  </head>
  <body>
    <main id="app">
      <canvas id="scene" aria-label="Entity 3D visual interface prototype"></canvas>
      <section class="hud" aria-label="Prototype controls">
        <div class="readout">
          <span>ENTITY</span>
          <strong id="mode-label">IDLE</strong>
        </div>
        <div class="readout right">
          <span>ENERGY</span>
          <strong id="energy-label">62%</strong>
        </div>
        <div class="mode-swatch" id="mode-swatch" aria-hidden="true"></div>
        <div class="state-buttons">
          <button data-mode="idle" class="active">Idle</button>
          <button data-mode="listening">Listening</button>
          <button data-mode="thinking">Thinking</button>
          <button data-mode="speaking">Speaking</button>
          <button data-mode="acting">Acting</button>
          <button data-mode="autonomous_goal">Autonomous</button>
          <button data-mode="service_issue">Service</button>
          <button data-mode="offline">Offline</button>
        </div>
        <label class="slider">
          Energy
          <input id="energy" type="range" min="0" max="100" value="62" />
        </label>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
